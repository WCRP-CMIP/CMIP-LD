name: Setup Machine
description: Load Ubuntu and checkout the latest branch of current repo

inputs:
  depth:
    required: false
    type: string
    default: 1
  repository:
    required: true
    type: string
    # default ${{ github.repository }}

jobs:
  setup-machine:
    runs-on: ubuntu-latest
    steps:
    
    - name: Checkout last two commits
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.repository }}
        fetch-depth: ${{ inputs.depth }}  
        # 2 -> Fetch only the last two commits

    - name: test
      run: | 
        echo ${{ inputs.depth }}



    