name: 'updated directories'
description: 'Gets directories which have been updated'

inputs:
  filter_dir:
    description: 'Directory to filter updated directories'
    required: false
# outputs:
#   updated_dirs:
#     description: directories which have been updated
# inputs:
#   content:
#     description: 'Content to write to the summary'
#     required: true
    
runs:
  using: "composite"
  steps:
    - name: updated directories
      id: updir
      shell: bash
      run: |
        git fetch --depth=2
        PREV_COMMIT=$(git log -2 --pretty=format:"%H" | tail -n1)
        UPDATED_FILES=$(git diff --name-only $PREV_COMMIT HEAD)
        UPDATED_DIRS=$(for file in $UPDATED_FILES; do
          dir=$(dirname "$file")
          while [ "$dir" != "." ]; do
            echo "$dir"
            dir=$(dirname "$dir")
          done
        done | sort -u)

        echo "### Updated dirs"

        # Filter by the specified directory if provided
        if [ -n "${{ inputs.filter_dir }}" ]; then
          FILTERED_DIRS=$(echo "$UPDATED_DIRS" | grep "^${{ inputs.filter_dir }}")
        else
          FILTERED_DIRS=$UPDATED_DIRS
        fi

        echo "...";
        UPDATED_DIRS_LIST=$(echo "$FILTERED_DIRS" | tr '\n' ' ')
        # Set the output
        # echo "updated_dirs=$UPDATED_DIRS_LIST" >> $GITHUB_OUTPUT

        echo "updated_dirs=$UPDATED_DIRS_LIST" >> $GITHUB_ENV
        # access  ${{env.updated_dirs }}"

        echo "### Updated Directories:" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY # this is a blank line
        # echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY

        for dir in $UPDATED_DIRS_LIST; do
          echo "-  $dir " >> $GITHUB_STEP_SUMMARY
        done


        # https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/workflow-commands-for-github-actions

        
